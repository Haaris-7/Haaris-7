name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch:       # Manual trigger
  push:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────
  # Base metrics card (header + stats)
  # ──────────────────────────────────────────────
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: Haaris-7
          template: classic
          config_timezone: America/Toronto
          config_display: large
          config_padding: 0, 8 + 11%

          # Base content
          base: header, activity, community, repositories
          base_indepth: yes

          # Lines of code
          plugin_lines: yes
          plugin_lines_sections: base

          # Follow-up ratios
          plugin_followup: yes
          plugin_followup_indepth: yes
          plugin_followup_sections: repositories

  # ──────────────────────────────────────────────
  # Isometric commit calendar (full year)
  # ──────────────────────────────────────────────
  isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.isocalendar.fullyear.svg
          user: Haaris-7
          template: classic
          config_timezone: America/Toronto
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

  # ──────────────────────────────────────────────
  # Languages breakdown (indepth analysis)
  # ──────────────────────────────────────────────
  languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.languages.svg
          user: Haaris-7
          template: classic
          config_timezone: America/Toronto
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 6
          plugin_languages_sections: most-used, recently-used
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, cmake, shell, batchfile
          plugin_languages_colors: github
          plugin_languages_analysis_timeout: 30

  # ──────────────────────────────────────────────
  # Coding habits (activity charts)
  # ──────────────────────────────────────────────
  habits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.habits.svg
          user: Haaris-7
          template: classic
          config_timezone: America/Toronto
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_languages_limit: 8
